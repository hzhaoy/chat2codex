name: Publish to npm

on:
  push:
    tags:
      - "v*"

permissions:
  contents: read
  id-token: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v7

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.9

      - name: Set up Node
        uses: actions/setup-node@v6
        with:
          node-version: "24"
          registry-url: "https://registry.npmjs.org"
          package-manager-cache: false

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Verify tag matches package version
        run: |
          node -e "const p=require('./package.json'); const expected='v'+p.version; const actual=process.env.GITHUB_REF_NAME; if (actual !== expected) { throw new Error('Tag '+actual+' does not match package version '+expected); }"

      - name: Run checks
        run: bun run check

      - name: Use latest npm CLI
        run: npm install -g npm@latest

      - name: Publish package
        run: npm publish
